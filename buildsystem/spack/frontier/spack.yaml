spack:
  specs:
  - exago@develop
  view: false
  concretizer:
    unify: when_possible
    reuse: false
  packages:
    all:
      providers:
        blas: [openblas]
        mpi: [cray-mpich]
      target: [zen3]
    gcc:
      externals:
      - spec: gcc@14.2.0 languages:='c,c++,fortran'
        prefix: /opt/cray/pe/gcc-native/14
        extra_attributes:
          compilers:
            c: /opt/cray/pe/gcc-native/14/bin/gcc
            cxx: /opt/cray/pe/gcc-native/14/bin/g++
            fortran: /opt/cray/pe/gcc-native/14/bin/gfortran
          flags: {}
          environment: {}
          extra_rpaths: []
    exago:
      require: ~python+raja+hiop+rocm+ipopt amdgpu_target=gfx90a
    hiop:
      require: +sparse+mpi+raja+rocm~ginkgo+kron
      version: [1.1.1]
    ipopt:
      require: '~metis+coinhsl~mumps'
    # Pin OpenBlas version for consistent test results.
    openblas:
      require: '@0.3.20'
    umpire:
      require: ~examples
    raja:
      require: ~examples~exercises
    coinhsl:
      require: '@2024.05.15+metis'
    magma:
      require: '@2.8.0'
    petsc:
      require: ~hypre~superlu-dist~hdf5+metis
    cray-mpich:
      buildable: false
      externals:
      - spec: cray-mpich@8.1.31 %gcc
        prefix: /opt/cray/pe/mpich/8.1.31/ofi/gnu/12.3/
        modules:
        - PrgEnv-gnu
        - cray-mpich/8.1.31
        - rocm/6.3.1
        - craype-accel-amd-gfx90a
        - craype-x86-trento
        - libfabric
    cmake:
      buildable: false
      externals:
      - spec: cmake@3.30.5
        modules:
        - cmake/3.30.5
    libfabric:
      buildable: false
      externals:
      - spec: libfabric@1.22.0
        modules:
        - libfabric/1.22.0
    python:
      externals:
      - spec: python@3.11.7
        modules:
        - cray-python/3.11.7
      buildable: false
    hip:
      buildable: false
      externals:
      - spec: hip@6.3.1
        prefix: /opt/rocm-6.3.1
    hipblas:
      buildable: false
      externals:
      - spec: hipblas@6.3.1
        prefix: /opt/rocm-6.3.1/
    hipcub:
      buildable: false
      externals:
      - spec: hipcub@6.3.1
        prefix: /opt/rocm-6.3.1/
    hipfft:
      buildable: false
      externals:
      - spec: hipfft@6.3.1
        prefix: /opt/rocm-6.3.1/
    hiprand:
      buildable: false
      externals:
      - spec: hiprand@6.3.1
        prefix: /opt/rocm-6.3.1
    hipsolver:
      buildable: false
      externals:
      - spec: hipsolver@6.3.1
        prefix: /opt/rocm-6.3.1
    hipsparse:
      buildable: false
      externals:
      - spec: hipsparse@6.3.1
        prefix: /opt/rocm-6.3.1/
    hsa-rocr-dev:
      buildable: false
      externals:
      - spec: hsa-rocr-dev@6.3.1
        prefix: /opt/rocm-6.3.1/
    llvm-amdgpu:
      buildable: false
      externals:
      - spec: llvm-amdgpu@6.3.1 languages:='c,c++'
        prefix: /opt/rocm-6.3.1/
        extra_attributes:
          compilers:
            cc: /opt/rocm-6.3.1/llvm/bin/amdclang
            cxx: /opt/rocm-6.3.1/llvm/bin/amdclang++
            fortran: /opt/rocm-6.3.1/llvm/bin/amdflang
          flags: {}
          environment: {}
          extra_rpaths: []
    rocprim:
      buildable: false
      externals:
      - spec: rocprim@6.3.1
        prefix: /opt/rocm-6.3.1
    rocm-core:
      buildable: false
      externals:
      - spec: rocm-core@6.3.1
        prefix: /opt/rocm-6.3.1/
  config:
    install_tree:
      root: $SPACK_INSTALL
    source_cache: $SPACK_CACHE/source-cache
    build_cache: $SPACK_CACHE/build-cache
    misc_cache: $SPACK_CACHE/misc-cache
    build_stage: $SPACK_CACHE/build-stage
  modules:
    default:
      roots:
        tcl: $SPACK_INSTALL/$SPACK_MODULES
      tcl:
        exclude: # Do not generate new modules for external packages
          - cmake
          - cray-mpich
          - gcc
          - glibc
          - hip
          - hipblas
          - hiprand
          - hipsparse
          - hsa-rocr-dev
          - llvm-amdgpu
          - python
          - rocm-core
          - rocprim
        all:
          filter:
            exclude_env_vars:
            - "CC"
            - "CXX"
            - "FC"
            - "F77"
