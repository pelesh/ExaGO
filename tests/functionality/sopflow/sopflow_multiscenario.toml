testsuite_name = "SOPFLOW Multiscenario Functionality tests"

[presets]
tolerance = 1e-3
network = 'datafiles/case_ACTIVSg200.m'
scenfile = 'datafiles/10_scenarios_ACTIVSg200.csv'
multicontingency = false
multiperiod = false
flatten = true

[[testcase]]
description = 'datafiles/case_ACTIVSg200.m IPOPT 1scen SOPFLOW'
solver = 'IPOPT'
num_scenarios = 1
num_iters = 130                        # newell(361) prev 290
iter_range = 110
obj_value = 14316.6559703

[[testcase]]
description = 'datafiles/case_ACTIVSg200.m IPOPT 2scen SOPFLOW'
solver = 'IPOPT'
num_scenarios = 2
num_iters = 158                        # newell(129) prev 153
iter_range = 25
obj_value = 14316.6558148

[[testcase]]
description = 'datafiles/case_ACTIVSg200.m IPOPT 3scen SOPFLOW'
solver = 'IPOPT'
num_scenarios = 3
num_iters = 162                        # newell(311) prev 387
iter_range = 100
obj_value = 14316.6578226

